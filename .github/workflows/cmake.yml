jobs:
  build:
    runs-on: '${{ matrix.os }}'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - if: "runner.os == 'Linux'"
        name: 'Install dependencies (Linux)'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - if: "runner.os == 'macOS'"
        name: 'Install dependencies (macOS)'
        run: 'brew install openssl@3'
      - name: 'Configure'
        run: >-
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
      - name: 'Build'
        run: >-
          cmake --build ${{ github.workspace }}/build
          --config ${{ matrix.build-type }} --verbose
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6'
        with:
          python-version: '3.x'
      - name: 'Install Python build tooling'
        run: 'python -m pip install --upgrade build'
      - name: 'Build Python wheel'
        run: 'python -m build --wheel'
    strategy:
      fail-fast: false
      matrix:
        build-type:
          - 'Debug'
          - 'Release'
        os:
          - 'macos-latest'
          - 'ubuntu-latest'
          - 'windows-latest'
name: 'Build'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.py'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'pyproject.toml'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.py'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'pyproject.toml'
permissions:
  contents: 'read'
