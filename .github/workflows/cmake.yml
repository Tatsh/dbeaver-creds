jobs:
  build:
    runs-on: '${{ matrix.os }}'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - if: "runner.os == 'Linux'"
        name: 'Install dependencies (Linux)'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - if: "runner.os == 'macOS'"
        name: 'Install dependencies (macOS)'
        run: 'brew install openssl@3'
      - name: 'Configure'
        run: >-
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
      - name: 'Build'
        run: >-
          cmake --build ${{ github.workspace }}/build
          --config ${{ matrix.build-type }} --verbose
      - name: 'Set up Python'
        uses: 'actions/setup-python@v6'
        with:
          python-version: '3.x'
      - name: 'Install Python build tooling'
        run: 'python -m pip install --upgrade build'
      - name: 'Build Python wheel'
        run: 'python -m build --wheel'
      - name: 'Stage artifacts'
        shell: 'bash'
        run: |
          set -e
          mkdir -p stage
          cp dist/*.whl stage/
          bin=$(find "${{ github.workspace }}/build/src" -maxdepth 2 -name 'dbeaver-creds' -o -name 'dbeaver-creds.exe' | head -1)
          if [ -n "$bin" ]; then cp "$bin" stage/; fi
      - name: 'Upload workflow artifacts'
        uses: 'actions/upload-artifact@v4'
        with:
          if-no-files-found: 'error'
          name: 'dbeaver-creds-${{ matrix.os }}-${{ matrix.build-type }}'
          path: 'stage/*'
      - if: "matrix.build-type == 'Release' && github.ref_type == 'tag'"
        name: 'Attach Release artifacts to draft GitHub release'
        uses: 'softprops/action-gh-release@v3.0.0'
        with:
          draft: true
          fail_on_unmatched_files: true
          files: 'stage/*'
    strategy:
      fail-fast: false
      matrix:
        build-type:
          - 'Debug'
          - 'Release'
        os:
          - 'macos-13'
          - 'macos-latest'
          - 'ubuntu-24.04-arm'
          - 'ubuntu-latest'
          - 'windows-11-arm'
          - 'windows-latest'
name: 'Build'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.py'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'pyproject.toml'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.py'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'pyproject.toml'
    tags:
      - 'v*'
permissions:
  contents: 'write'
