app-id: 'sh.tat.dbeaver-creds'
command: 'dbeaver-creds'
finish-args:
  - '--filesystem=home'
modules:
  - buildsystem: 'cmake-ninja'
    config-opts:
      - '-DCMAKE_BUILD_TYPE=Release'
      - '-DBUILD_CLI=ON'
      - '-DBUILD_PYTHON_EXTENSION=OFF'
      - '-DBUILD_TESTS=OFF'
    name: 'dbeaver-creds'
    sources:
      - tag: 'v0.1.1'
        type: 'git'
        url: 'https://github.com/Tatsh/dbeaver-creds.git'
runtime: 'org.freedesktop.Platform'
runtime-version: '24.08'
sdk: 'org.freedesktop.Sdk'
